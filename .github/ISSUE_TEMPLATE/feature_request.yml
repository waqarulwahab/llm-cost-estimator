name: ✨ Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point. "I'm always trying to..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. UI sketch / settings / behavior welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
  - type: checkboxes
    id: roadmap
    attributes:
      label: Roadmap
      options:
        - label: I checked the [ROADMAP](../blob/main/ROADMAP.md) and this isn't already planned.
