name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  extension:
    name: Extension · lint · typecheck · test · e2e · package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run e2e
      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
          if-no-files-found: error

  mcp-server:
    name: MCP server · typecheck · stdio e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # The MCP server reuses the extension's core in ../src, whose files import
      # js-tiktoken — so the repo-root deps must be installed for both the
      # typecheck and the esbuild bundle to resolve them.
      - name: Install root deps (reused core)
        run: npm ci
      - name: Build & test MCP server
        working-directory: mcp-server
        run: |
          npm ci
          npm run typecheck
          npm test
